name: Weekly VoC Agent Run

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  weekly-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run weekly VoC agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          PRODUCT_A_URL: ${{ secrets.PRODUCT_A_URL }}
          PRODUCT_B_URL: ${{ secrets.PRODUCT_B_URL }}
          PRODUCT_A_NAME: ${{ secrets.PRODUCT_A_NAME }}
          PRODUCT_A_ID: product_a
          PRODUCT_B_NAME: ${{ secrets.PRODUCT_B_NAME }}
          PRODUCT_B_ID: product_b
          SCRAPE_PLATFORM: amazon
        run: python scheduler/weekly_runner.py --now

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: voc-reports
          path: reports/
